services:
  db:
    image: postgres:18-alpine
    container_name: omr-prod-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=omr_prod
    ports:
      - "127.0.0.1:5432:5432"  # localhost-only — do not expose to public internet
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
